<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHttp Server - Live</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;

            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 3rem;

        .badge {
            display: inline-block;
            background: #f1f5f9;
            color: #475569;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-family: ui-monospace, monospace;
            font-size: 0.875rem;
            font-weight: 600;
        }

    <div class="card">
        <h1>Server is Running</h1>
